name: stronger
description: "Be Stronger!"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.0
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  material_symbols_icons: ^4.2951.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png" # Il percorso dell'immagine che hai salvato
  adaptive_icon_background: "#121212" # Sfondo scuro coordinato per le icone Android moderne
  adaptive_icon_foreground: "assets/app_icon.png"
